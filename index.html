<script>
(function() {
  // Function to set or update viewport meta tag
  function ensureViewportMeta() {
    var viewportMeta = document.querySelector('meta[name="viewport"]');
    
    if (!viewportMeta) {
      // Create viewport meta tag if it doesn't exist
      viewportMeta = document.createElement('meta');
      viewportMeta.name = 'viewport';
      document.head.insertBefore(viewportMeta, document.head.firstChild);
    }
    
    // Set viewport to prevent iOS auto-zoom
    // width=device-width: Use device width
    // initial-scale=1.0: Initial zoom level
    // maximum-scale=1.0: Prevent zooming beyond 1.0
    // user-scalable=no: Disable user scaling (prevents pinch zoom and auto-zoom on input focus)
    viewportMeta.content = 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no';
  }
  
  // Run immediately if DOM is already ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureViewportMeta);
  } else {
    ensureViewportMeta();
  }
  
  // Also ensure it's set when head is ready (in case script runs before head)
  if (!document.head) {
    var observer = new MutationObserver(function(mutations) {
      if (document.head) {
        ensureViewportMeta();
        observer.disconnect();
      }
    });
    observer.observe(document.documentElement, { childList: true });
  }
})();

    if (!ptrDownPos) return true; // no pointerdown recorded — be safe, treat as tap

    var dy = e.clientY - ptrDownPos.y;
    return (dx * dx + dy * dy) <= TAP_THRESHOLD_SQ;

      if (existingPointerListener) {

        if (!isTap(e)) return;

          bubbles: e.bubbles, cancelable: e.cancelable, view: e.view,
          detail: 1,
          screenX: e.screenX, screenY: e.screenY,
          clientX: e.clientX, clientY: e.clientY,
          ctrlKey: e.ctrlKey, altKey: e.altKey,
          shiftKey: e.shiftKey, metaKey: e.metaKey,

  // Only dispatch when the gesture is a tap (not a swipe).
  var SEKAI_SYNTHETIC_KEY = '__sekai_sc';

      detail: 1,

      clientX: e.clientX, clientY: e.clientY,
      ctrlKey: e.ctrlKey, altKey: e.altKey,
      shiftKey: e.shiftKey, metaKey: e.metaKey,
      button: 0, relatedTarget: null

  originalAddEventListener.call(document, 'click', function(e) {
    if (!e[SEKAI_SYNTHETIC_KEY]) {
      e.stopImmediatePropagation();
    }

<script>
(function() {
  // Track recent touch to block emulated mouse events
  var lastTouchTime = 0;
  var TOUCH_MOUSE_DELAY = 200; // ms to block mouse events after touch

  // Global touch tracker - set flag when touch occurs
  document.addEventListener('touchstart', function() {
    lastTouchTime = Date.now();
  }, { passive: true, capture: true });

  document.addEventListener('touchend', function() {
    lastTouchTime = Date.now();
  }, { passive: true, capture: true });

  // Block emulated mouse events that follow touch
  // BUT allow them on focusable elements (inputs need mousedown for focus)
  function blockEmulatedMouseHandler(e) {
    if (Date.now() - lastTouchTime < TOUCH_MOUSE_DELAY) {
      // Don't block on focusable elements - they need mousedown for focus
      var target = e.target;
      if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable) {
        return; // Allow the event
      }
      e.stopPropagation();
      // NOTE: Do NOT call preventDefault() here.
      // CSS user-select:none already handles text selection prevention.
      // On iOS WKWebView, mousedown.preventDefault() can intermittently
      // suppress click event synthesis, breaking .onclick handlers.
    }
  }

  // Capture phase blockers for emulated mouse events
  document.addEventListener('mousedown', blockEmulatedMouseHandler, { capture: true });

  // Patch addEventListener to force passive on touch events.
  // Expose original globally so SCROLL_BLOCK_SCRIPT can register a
  // non-passive touchmove handler to block iOS WKWebView parent scroll.
  var originalAddEventListener = EventTarget.prototype.addEventListener;
  window.__sekai_orig_ael = originalAddEventListener;

  EventTarget.prototype.addEventListener = function(type, listener, options) {
    // Convert touchstart/touchmove to passive
    // Mouse event emulation is handled by our global blockers above
    if (type === 'touchstart' || type === 'touchmove') {
      var newOptions = Object.assign({}, options || {}, { passive: true });
      return originalAddEventListener.call(this, type, listener, newOptions);
    }
    return originalAddEventListener.call(this, type, listener, options);
  };
})();
</script>

<script>
(function() {
  // Track if dom_ready was already sent
  var domReadySent = false;

  function sendDomReady() {
    if (domReadySent) return;
    domReadySent = true;
    window.parent.postMessage({ type: 'sekai_iframe_dom_ready' }, '*');
  }

  // Send dom_ready when DOMContentLoaded fires
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', sendDomReady);
  } else {
    // DOM already loaded
    sendDomReady();
  }

  // Helper to serialize message - handles objects that would become [object Object]
  function serializeMessage(msg) {
    if (msg === null || msg === undefined) return '';
    if (typeof msg === 'string') return msg;
    if (typeof msg === 'object') {
      try {
        return JSON.stringify(msg);
      } catch (e) {
        return String(msg);
      }
    }
    return String(msg);
  }

  // Catch JS errors and send to parent
  window.onerror = function(message, source, lineno, colno, error) {
    window.parent.postMessage({
      type: 'sekai_iframe_js_error',
      message: serializeMessage(message),
      source: source || '',
      lineno: lineno || 0,
      colno: colno || 0,
      errorName: error ? error.name : '',
      errorStack: error ? error.stack : ''
    }, '*');
    // Return false to allow default error handling
    return false;
  };

  // Also catch unhandled promise rejections
  window.addEventListener('unhandledrejection', function(event) {
    var reason = event.reason;
    var isError = reason instanceof Error;
    window.parent.postMessage({
      type: 'sekai_iframe_js_error',
      message: reason ? serializeMessage(reason) : 'Unhandled promise rejection',
      source: 'unhandledrejection',
      lineno: 0,
      colno: 0,
      errorName: isError ? reason.name : '',
      errorStack: isError ? reason.stack : ''
    }, '*');
  });
})();
</script>

<script>
(function() {
  // Collect all devicemotion listeners registered by game code
  var deviceMotionListeners = [];

  // Save original addEventListener
  var originalAddEventListener = window.addEventListener;

  // Intercept addEventListener to capture devicemotion listeners
  window.addEventListener = function(type, listener, options) {
    if (type === 'devicemotion' && typeof listener === 'function') {
      deviceMotionListeners.push(listener);
      // Also add to native in case permission is granted elsewhere
      return originalAddEventListener.call(this, type, listener, options);
    }
    return originalAddEventListener.call(this, type, listener, options);
  };

  // Also intercept removeEventListener
  var originalRemoveEventListener = window.removeEventListener;
  window.removeEventListener = function(type, listener, options) {
    if (type === 'devicemotion' && typeof listener === 'function') {
      var index = deviceMotionListeners.indexOf(listener);
      if (index !== -1) {
        deviceMotionListeners.splice(index, 1);
      }
    }
    return originalRemoveEventListener.call(this, type, listener, options);
  };

  // Listen for forwarded motion data from parent
  window.addEventListener('message', function(event) {
    if (!event.data || event.data.type !== '__sekai_device_motion__') return;

    var data = event.data;

    // Create a synthetic event-like object
    var syntheticEvent = {
      accelerationIncludingGravity: data.accelerationIncludingGravity,
      acceleration: data.acceleration,
      rotationRate: data.rotationRate,
      interval: data.interval || 16,
      // Make it look like a real event
      type: 'devicemotion',
      timeStamp: data.timestamp || Date.now(),
      target: window,
      currentTarget: window,
      preventDefault: function() {},
      stopPropagation: function() {},
      stopImmediatePropagation: function() {}
    };

    // Trigger all registered listeners
    deviceMotionListeners.forEach(function(listener) {
      try {
        listener(syntheticEvent);
      } catch (e) {
        // Ignore listener errors
      }
    });
  });
})();
</script>

(function() {

      var ctx = new originalAudioContext();

      // resume() loop (observed in real games) does not spam vconsole,
      // while new contexts still act as fresh sentinels.

      var browserResumeWarned = false;

          // still enters 'running' during mute, the only remaining cause is

          // interruption ending). If this log ever appears in practice, the

          // state transitions.

      // resume() on an already-running context is a no-op per the Web Audio spec.

    var elements = collectTrackedMediaElements();
    for (var i = 0; i < elements.length; i++) {
      if (isElementAudible(elements[i])) return true;
    }
    for (var j = 0; j < audioContexts.length; j++) {

    // 3 elements + suspends 1 context in sequence) into a single notification.
    Promise.resolve().then(function() {

  // Only react to events from <audio> / <video> elements.

    if (!event.data) return;

        (event.data.origin === 'sekai_gaming_iframe_api' && event.data.type === 'receive_audio_mute')) {

        (event.data.origin === 'sekai_gaming_iframe_api' && event.data.type === 'receive_audio_unmute')) {
      unmuteAllAudio();
    }
  });
})();

(function() {
  var ORIGIN = 'sekai_gaming_iframe_api';

  // --- Shared helper: find <audio> elements by URL and set volume ---
  function applyVolumeByUrl(url, volume) {
    if (!url) return;
    var vol = Math.max(0, Math.min(1, Number(volume)));
    if (isNaN(vol)) return;
    document.querySelectorAll('audio').forEach(function(el) {
      var src = el.src || el.currentSrc || '';
      if (src === url) {
        el.volume = vol;
      }
    });
  }

  // --- Initial volume on game load ---
  // Reads window.sekaiEditable (written into the HTML by the backend) and applies
  // any volume values to matching <audio> elements. The LLM-generated game code
  // does not read the volume field, so we apply it here.
  function applyInitialVolumes() {
    var meta = window.sekaiEditable;
    if (!meta) return;
    var items = (meta.music || []).concat(meta.sfx || []);
    items.forEach(function(item) {
      if (item.value && item.volume !== undefined && item.volume !== null) {
        applyVolumeByUrl(item.value, item.volume);
      }
    });
  }

  // audio elements created during game initialization (e.g. after DOMContentLoaded).
  if (document.readyState !== 'loading') {
    applyInitialVolumes();
  } else {
    document.addEventListener('DOMContentLoaded', applyInitialVolumes);
  }
  setTimeout(applyInitialVolumes, 500);
  setTimeout(applyInitialVolumes, 1500);

  // --- Real-time volume control (postMessage from editor) ---
  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data || data.origin !== ORIGIN) return;

    var payload = data.data;
    if (!payload) return;

    if (data.type === 'set_audio_volume') {
      // Real-time drag path: LLM code never sees this type
      applyVolumeByUrl(payload.url, payload.volume);
    } else if (data.type === 'apply_change' && payload.volume !== undefined && payload.volume !== null) {
      // Commit path (on release): runs before LLM handler via capture phase
      applyVolumeByUrl(payload.value, payload.volume);
    }
  }, true); // capture phase — runs before LLM game code
})();

<script>
(function() {
  var ORIGIN = 'sekai_gaming_iframe_api';

  // Handle the font data URL response from the parent window.
  // The parent fetched the font bytes and encoded them as a base64 data URL
  // so we can inject @font-face without any cross-origin network request.
  window.addEventListener('message', function(event) {
    var msg = event.data;
    if (!msg || msg.type !== 'sekai_font_data_response') return;

    var prevStyle = document.getElementById('sekai-font-' + msg.itemId);
    if (prevStyle) prevStyle.parentNode.removeChild(prevStyle);

    var style = document.createElement('style');
    style.id = 'sekai-font-' + msg.itemId;
    // font-weight range covers all weights so we don't need per-weight rules.
    style.textContent = "@font-face { font-family: '" + msg.family + "'; src: url('" + msg.dataUrl + "'); font-weight: 100 900; }";
    document.head.appendChild(style);

    if (msg.cssVar) {
      document.documentElement.style.setProperty(msg.cssVar, "'" + msg.family + "'");
    }
  });

  window.addEventListener('message', function(event) {
    var data = event.data;
    if (!data || data.origin !== ORIGIN) return;
    if (data.type !== 'apply_change') return;

    var payload = data.data;
    if (!payload || !payload.value) return;

    var meta = window.sekaiEditable;
    if (!meta) return;

    // --- Font handling ---
    // No type guard — LLM-generated sekaiEditable often omits the type field.
    if (meta.fonts) {
      for (var i = 0; i < meta.fonts.length; i++) {
        var font = meta.fonts[i];
        if (font.id === payload.id) {
          // Update sekaiEditable synchronously so get_current_html saves the new value.
          font.value = payload.value;
          if (payload.name) font.name = payload.name;
          // Ask the parent to fetch and return the font as a data URL.
          // Avoids WKWebView blob-iframe CORS restrictions on external font fetches.
          window.parent.postMessage({
            type: 'sekai_request_font_data',
            itemId: font.id,
            fontUrl: payload.value,
            family: font.fallback || ('sekai-swap-' + font.id),
            cssVar: font.cssVar || null,
          }, '*');
          return;
        }
      }
    }

    // --- Model handling ---
    if (meta.models) {
      for (var j = 0; j < meta.models.length; j++) {
        var model = meta.models[j];
        if (model.id === payload.id) {
          // Update sekaiEditable so get_current_html saves the new value.
          model.value = payload.value;
          if (payload.name) model.name = payload.name;
          return;
        }
      }
    }
  }, true); // capture phase — runs before LLM apply_change handler
})();

  // CRITICAL: touch-action:none is the PRIMARY scroll blocker - it's handled by the compositor

  // non-passive touchmove handler with preventDefault() is the only

    var t = e.target;
    if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable) {

(function() {
  var touchStartY = null;
  var lastSentTime = 0;
  var SWIPE_THRESHOLD = 100;
  var DEBOUNCE_MS = 500; // Prevent multiple events from single swipe

    if (e.touches.length === 1) {
      touchStartY = e.touches[0].clientY;
    }

  document.addEventListener('touchend', function(e) {
    if (touchStartY !== null && e.changedTouches.length === 1) {
      var now = Date.now();
      var deltaY = touchStartY - e.changedTouches[0].clientY;
      var timeSinceLast = now - lastSentTime;

      if (deltaY >= SWIPE_THRESHOLD && timeSinceLast >= DEBOUNCE_MS) {
        lastSentTime = now;
        window.parent.postMessage({
          type: 'sekai_iframe_swipe_up',
          deltaY: deltaY,
          timestamp: now

  }, { passive: true, capture: true });

  document.addEventListener('touchcancel', function() {
    touchStartY = null;
  }, { passive: true, capture: true });

<script>
(function() {

  function urlToBase64(url) {
    return fetch(url)
      .then(function(res) { return res.blob(); })
      .then(function(blob) {
        return new Promise(function(resolve) {
          var reader = new FileReader();
          reader.onload = function() { resolve(reader.result); };
          reader.readAsDataURL(blob);
        });
      })
      .catch(function() { return null; });
  }

  function inlineImages(doc) {
    var imgs = Array.prototype.slice.call(doc.querySelectorAll('img[src]'));
    return Promise.all(imgs.map(function(img) {
      return urlToBase64(img.src).then(function(base64) {
        if (base64) img.setAttribute('src', base64);
      });
    }));
  }

  function inlineCssUrls(css, baseUrl) {
    var urlPattern = /url(s*([^)]+)s*)/g;
    var matches = [];
    var match;
    while ((match = urlPattern.exec(css)) !== null) {
      var url = match[1].trim().replace(/^['"]|['"]$/g, '');
      if (!url.startsWith('data:') && !url.startsWith('#')) {
        matches.push({ full: match[0], url: url });
      }
    }
    if (matches.length === 0) return Promise.resolve(css);

    return Promise.all(matches.map(function(m) {
      var resolved;
      try { resolved = new URL(m.url, baseUrl).href; } catch(e) { return Promise.resolve(null); }
      return urlToBase64(resolved).then(function(base64) {
        return base64 ? { original: m.full, replacement: 'url(' + base64 + ')' } : null;
      });
    })).then(function(results) {
      results.forEach(function(r) {
        if (r) css = css.split(r.original).join(r.replacement);
      });
      return css;
    });
  }

  function inlineStylesheets(doc) {
    var links = Array.prototype.slice.call(doc.querySelectorAll('link[rel="stylesheet"]'));
    return Promise.all(links.map(function(link) {
      var href = link.href;
      return fetch(href)
        .then(function(res) { return res.text(); })
        .then(function(css) { return inlineCssUrls(css, href); })
        .then(function(css) {
          var style = doc.createElement('style');
          style.textContent = css;
          link.parentNode.replaceChild(style, link);
        })
        .catch(function() {});
    }));
  }

  function captureFullSnapshot() {
    var cloned = document.documentElement.cloneNode(true);
    var tempDoc = document.implementation.createHTMLDocument('');
    tempDoc.documentElement.replaceWith(cloned);

    // Remove all script tags so the snapshot is a frozen DOM state —
    // not a re-playable game. Without this, opening the file re-runs
    // all scripts and resets the game, destroying the captured state.
    var scripts = Array.prototype.slice.call(tempDoc.querySelectorAll('script'));

      inlineImages(tempDoc),
      inlineStylesheets(tempDoc),

    });

  var _runtimeErrors = [];

  window.addEventListener('error', function(e) {
    _runtimeErrors.push({
      type: 'error',
      message: e.message,
      source: e.filename,
      line: e.lineno,
      col: e.colno,
      stack: e.error ? e.error.stack : null,
      timestamp: new Date().toISOString(),

    _runtimeErrors.push({
      type: 'unhandledrejection',
      message: e.reason instanceof Error ? e.reason.message : String(e.reason),
      stack: e.reason instanceof Error ? e.reason.stack : null,
      timestamp: new Date().toISOString(),

      window.parent.postMessage({
        type: 'SNAPSHOT_RESULT',
        payload: {
          html: html,
          errors: _runtimeErrors.slice(),
        }
      }, '*');
    });
  });

})();

            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1);
        }
        .modal-overlay.visible .modal-content { transform: translateY(0); }

        .asset-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 16px;
            overflow-y: auto;
            touch-action: pan-y !important;
            background: var(--surface-color);
        }
        
        .asset-grid * {
            touch-action: pan-y !important;
        }

        .asset-item {
            aspect-ratio: 1;
            background: var(--surface-light);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid #2e1065;
        }
        .asset-item:active { opacity: 0.8; transform: scale(0.95); }
        .asset-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .asset-item.contain img { object-fit: contain; padding: 4px; }
        .asset-item-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 5, 25, 0.95);
            color: #d8b4fe;
            font-size: 9px;
            padding: 4px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-btn {
            padding: 12px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            background: var(--surface-color);
        }
        .tab-btn.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary);
        }

        #text-edit-modal .modal-content {
            height: auto;
            padding: 24px;
        }

        button:disabled { opacity: 0.5; pointer-events: none; }
    </style>

<body>

    <!-- Hidden Audio Elements -->
    <audio id="music-bgm" loop=""></audio>
    <audio id="sfx-pop"></audio>
    <audio id="sfx-whoosh"></audio>

    <!-- Hidden File Input for Custom Uploads -->
    <input type="file" id="hidden-input" style="display: none;" accept="image/*, audio/*, .mp3, .wav, .m4a, .ogg, application/octet-stream">

    <!-- Toast Notification for Actions (e.g. copying HTML) -->
    <div id="copy-toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-900/90 text-white px-4 py-3 rounded-full text-xs font-semibold shadow-lg flex items-center gap-2 pointer-events-none opacity-0 transition-opacity duration-300 z-[100]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="check-circle" aria-hidden="true" class="lucide lucide-check-circle w-4 h-4 text-green-400"><path d="M21.801 10A10 10 0 1 1 17 3.335"></path><path d="m9 11 3 3L22 4"></path></svg>
        <span id="toast-message">HTML Copied to Clipboard!</span>
    </div>

    <div id="app">
        <!-- Header -->
        <header class="flex justify-between items-center p-4 bg-black border-b border-purple-900/30 flex-shrink-0 z-20 shadow-lg relative">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-purple-900/40 flex items-center justify-center text-purple-400">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="clapperboard" aria-hidden="true" class="lucide lucide-clapperboard w-5 h-5"><path d="m12.296 3.464 3.02 3.956"></path><path d="M20.2 6 3 11l-.9-2.4c-.3-1.1.3-2.2 1.3-2.5l13.5-4c1.1-.3 2.2.3 2.5 1.3z"></path><path d="M3 11h18v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><path d="m6.18 5.276 3.1 3.899"></path></svg>
                </div>
                <h1 class="font-bold text-lg tracking-tight text-white">David's Animation Engine</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-export" onclick="exportRenderedAnimation()" class="px-3 py-1.5 bg-purple-600 hover:bg-purple-700 text-white rounded-full text-xs font-bold flex items-center gap-1 active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="download" aria-hidden="true" class="lucide lucide-download w-3.5 h-3.5"><path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg> Export
                </button>
                <button id="btn-settings" onclick="openSettingsModal()" class="p-2 bg-purple-900/20 rounded-full text-purple-400 active:bg-purple-900/40">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="settings" aria-hidden="true" class="lucide lucide-settings w-5 h-5"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>
        </header>

        <!-- Stage Area -->
        <div id="stage-wrapper">
            <div id="stage" style="background: rgb(10, 10, 10);"></div>
        </div>

        <!-- Timeline & Toolbar Area -->
        <div id="timeline-area">
            <!-- Scrubber -->
            <div class="px-4 pt-4 pb-1 flex justify-between items-center">
                <span id="time-display" class="font-mono text-sm font-bold text-purple-400">00:00</span>
                <span id="max-time-display" class="font-mono text-xs text-purple-600/70">10:00</span>
            </div>
            <div class="scrubber-container px-4">
                <div id="scrubber-track">
                    <div class="w-full h-1.5 bg-zinc-950 rounded-full border border-purple-900/30"></div>
                    <div id="timeline-track-fill" class="absolute left-0 h-1.5 bg-purple-600 rounded-full pointer-events-none shadow-[0_0_10px_#9333ea]" style="width: 0%"></div>
                    <div id="scrubber-thumb" class="absolute w-7 h-7 rounded-full bg-purple-500 border-2 border-white shadow-[0_0_12px_#9333ea] -ml-3.5 top-1/2 -translate-y-1/2 cursor-grab active:cursor-grabbing z-[5]"></div>
                    <div id="keyframe-markers" class="absolute inset-x-0 top-0 bottom-0 pointer-events-none"></div>
                </div>
            </div>

            <!-- Play Controls -->
            <div class="flex justify-center items-center py-2 gap-8">

                    osc.connect(gain);

            let k1 = kfs[0], k2 = kfs[kfs.length - 1];
            for (let i = 0; i < kfs.length - 1; i++) {
                if (kfs[i].time <= time && kfs[i+1].time >= time) {
                    k1 = kfs[i]; k2 = kfs[i+1];
                    break;
                }
            }
            if (time <= k1.time) return { x: k1.x, y: k1.y, width: k1.width || entity.width || 30, height: k1.height || entity.height || 30, rotation: k1.rotation || entity.rotation || 0, opacity: k1.opacity ?? entity.opacity ?? 1 };
            if (time >= k2.time) return { x: k2.x, y: k2.y, width: k2.width || entity.width || 30, height: k2.height || entity.height || 30, rotation: k2.rotation || entity.rotation || 0, opacity: k2.opacity ?? entity.opacity ?? 1 };

            const easingType = k1.easing || project.easing || 'easeInOut';

            const r1 = k1.rotation || 0;

                x: k1.x + (k2.x - k1.x) * progress,
                y: k1.y + (k2.y - k1.y) * progress,
                width: (k1.width || entity.width || 30) + ((k2.width || entity.width || 30) - (k1.width || entity.width || 30)) * progress,
                height: (k1.height || entity.height || 30) + ((k2.height || entity.height || 30) - (k1.height || entity.height || 30)) * progress,
                rotation: rot,
                opacity: (k1.opacity ?? 1) + ((k2.opacity ?? 1) - (k1.opacity ?? 1)) * progress

                    clientX = e.touches[0].clientX;
                }
                let pct = (clientX - rect.left) / rect.width;
                pct = Math.max(0, Math.min(1, pct));
                window.appState.currentTime = pct * window.appState.duration;
                updateTimelineUI();
                renderStage();
            }

            track.addEventListener('pointerdown', (e) => {
                isDragging = true;
                track.setPointerCapture(e.pointerId);
                updateFromPointer(e);
            });

            track.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                updateFromPointer(e);
            });

            const stopDrag = (e) => {
                if (isDragging) {
                    track.releasePointerCapture(e.pointerId);
                    isDragging = false;
                }
            };

            track.addEventListener('pointerup', stopDrag);
            track.addEventListener('pointercancel', stopDrag);
        }

        // --- TIMELINE & PLAYBACK ---
        
        function togglePlayback() {
            window.appState.playing = !window.appState.playing;
            window.appState.lastFrameTime = performance.now();
            
            const icon = document.getElementById('icon-play');
            if (window.appState.playing) {
                if (window.appState.currentTime >= window.appState.duration) window.appState.currentTime = 0;
                icon.setAttribute('data-lucide', 'pause');
            } else {
                icon.setAttribute('data-lucide', 'play');
            }
            lucide.createIcons();
        }

        // Play sounds at current timeline frame
        function playTimelineSounds(prevTime, currTime) {
            // Global timeline sounds
            window.appState.timelineSounds.forEach(sound => {
                if (sound.time > prevTime && sound.time <= currTime) {
                    const audio = new Audio(sound.url);
                    audio.volume = sound.volume !== undefined ? sound.volume : 0.8;
                    audio.play().catch(e => console.log('Timeline sound play failed', e));
                }
            });

            // Keyframe-associated sounds
            window.appState.entities.forEach(entity => {
                entity.keyframes.forEach(kf => {
                    if (kf.time > prevTime && kf.time <= currTime && kf.sound) {
                        const audio = new Audio(kf.sound);
                        audio.volume = 0.8;
                        audio.play().catch(e => console.log('Keyframe sound play failed', e));
                    }
                });
            });
        }

        function gameLoop(time) {
            if (window.appState.playing) {
                const prevTime = window.appState.currentTime;
                const delta = (time - window.appState.lastFrameTime) / 1000;
                window.appState.currentTime += delta;
                
                // Trigger sound playbacks
                playTimelineSounds(prevTime, window.appState.currentTime);

                if (window.appState.currentTime >= window.appState.duration) {
                    window.appState.currentTime = window.appState.duration;
                    togglePlayback();
                }
                
                updateTimelineUI();
            }
            
            renderStage();
            window.appState.lastFrameTime = time;
            requestAnimationFrame(gameLoop);
        }

        function updateTimelineUI() {
            const time = window.appState.currentTime;
            
            // Format 00:00
            const secs = Math.floor(time);
            const ms = Math.floor((time % 1) * 100);
            document.getElementById('time-display').textContent = `${secs.toString().padStart(2, '0')}:${ms.toString().padStart(2, '0')}`;
            
            // Fill
            const pct = (time / window.appState.duration) * 100;
            document.getElementById('timeline-track-fill').style.width = `${pct}%`;
            document.getElementById('scrubber-thumb').style.left = `${pct}%`;
            
            drawKeyframeMarkers();
            syncSelectionUI();
        }

        function syncSelectionUI() {
            const id = window.appState.selectedEntityId;
            if (!id) return;
            const ent = window.appState.entities.find(e => e.id === id);
            if (!ent) return;

            const state = getInterpolatedState(ent, window.appState.currentTime);

            // Sync Opacity Slider
            const opacitySlider = document.getElementById('control-opacity');
            if (opacitySlider) {
                opacitySlider.value = state.opacity;
                document.getElementById('control-opacity-label').textContent = Math.round(state.opacity * 100) + '%';
            }

            // Sync Width Slider
            const widthSlider = document.getElementById('control-width');
            if (widthSlider) {
                widthSlider.value = state.width;
                document.getElementById('control-width-label').textContent = Math.round(state.width) + '%';
            }

            // Sync Height Slider
            const heightSlider = document.getElementById('control-height');
            if (heightSlider) {
                heightSlider.value = state.height;
                document.getElementById('control-height-label').textContent = Math.round(state.height) + '%';
            }

            // Sync Keyframe Sound Trigger Selector
            const time = window.appState.currentTime;
            const threshold = 0.1;
            const kf = ent.keyframes.find(k => Math.abs(k.time - time) < threshold);
            const kfSoundSelect = document.getElementById('control-kf-sound');
            if (kfSoundSelect) {
                kfSoundSelect.value = kf?.sound || '';
            }

            // Sync Keyframe Easing
            const kfEasingSelect = document.getElementById('control-kf-easing');
            if (kfEasingSelect) {
                kfEasingSelect.value = kf?.easing || window.appState.easing || 'easeInOut';
            }
        }

        function drawKeyframeMarkers() {
            const container = document.getElementById('keyframe-markers');
            container.innerHTML = '';
            
            const entity = window.appState.entities.find(e => e.id === window.appState.selectedEntityId);
            if (!entity) return;
            
            entity.keyframes.forEach(kf => {
                const pct = (kf.time / window.appState.duration) * 100;
                const marker = document.createElement('div');
                marker.className = 'keyframe-marker';
                marker.style.left = `${pct}%`;
                container.appendChild(marker);
            });
        }

        // --- STAGE RENDERING & LOGIC ---

        function renderStage() {
            const stage = document.getElementById('stage');
            const time = window.appState.currentTime;
            
            // Clean up deleted entities from the DOM
            const currentIds = window.appState.entities.map(e => e.id);
            const domEntities = stage.querySelectorAll('.stage-entity');
            domEntities.forEach(el => {
                if (!currentIds.includes(el.id)) {
                    el.remove();
                }
            });

            window.appState.entities.forEach(entity => {
                let el = document.getElementById(entity.id);
                if (!el) {
                    el = document.createElement('div');
                    el.id = entity.id;
                    el.className = `stage-entity type-${entity.type}`;
                    
                    if (entity.type === 'image') {
                        const img = document.createElement('img');
                        img.src = entity.content;
                        el.appendChild(img);
                    } else if (entity.type === 'text') {
                        el.textContent = entity.content;
                    }
                    
                    // Add handles for interactive selection
                    const handleResize = document.createElement('div');
                    handleResize.className = 'handle handle-resize';
                    handleResize.dataset.type = 'resize';
                    el.appendChild(handleResize);

                    const handleRotate = document.createElement('div');
                    handleRotate.className = 'handle handle-rotate';
                    handleRotate.dataset.type = 'rotate';
                    el.appendChild(handleRotate);

                    stage.appendChild(el);
                }
                
                // Interpolate Position, scale/width, height, rotation, and opacity
                const state = getInterpolatedState(entity, time);
                el.style.left = `${state.x}%`;
                el.style.top = `${state.y}%`;
                
                // Apply Width, Height & Transform (Scale, Rotate, Flip Horizontal/Vertical)
                el.style.width = `${state.width}%`;
                el.style.height = `${state.height}%`;
                el.style.opacity = state.opacity;
                
                const rot = state.rotation;
                const fH = entity.flipH ? -1 : 1;
                const fV = entity.flipV ? -1 : 1;
                el.style.transform = `translate(-50%, -50%) rotate(${rot}deg) scale(${fH}, ${fV})`;
                
                if (entity.id === window.appState.selectedEntityId) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }

        const easings = {
            linear: t => t,
            easeIn: t => t * t,
            easeOut: t => t * (2 - t),
            easeInOut: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t,
            bounce: t => {
                const n1 = 7.5625;
                const d1 = 2.75;
                if (t < 1 / d1) {
                    return n1 * t * t;
                } else if (t < 2 / d1) {
                    return n1 * (t -= 1.5 / d1) * t + 0.75;
                } else if (t < 2.5 / d1) {
                    return n1 * (t -= 2.25 / d1) * t + 0.9375;
                } else {
                    return n1 * (t -= 2.625 / d1) * t + 0.984375;
                }
            },
            elastic: t => {
                const c4 = (2 * Math.PI) / 3;
                return t === 0 ? 0 : t === 1 ? 1 : -Math.pow(2, 10 * t - 10) * Math.sin((t * 10 - 10.75) * c4);
            }
        };

        function getInterpolatedState(entity, time) {
            const kfs = entity.keyframes;
            if (kfs.length === 0) {
                return { x: 50, y: 50, width: entity.width || 30, height: entity.height || 30, rotation: entity.rotation || 0, opacity: entity.opacity ?? 1 };
            }
            if (kfs.length === 1) {
                return { 
                    x: kfs[0].x, 
                    y: kfs[0].y, 
                    width: kfs[0].width ?? entity.width ?? 30, 
                    height: kfs[0].height ?? entity.height ?? 30, 
                    rotation: kfs[0].rotation ?? entity.rotation ?? 0,
                    opacity: kfs[0].opacity ?? entity.opacity ?? 1
                };
            }
            
            // Find surrounding keyframes
            let k1 = kfs[0], k2 = kfs[kfs.length - 1];
            for (let i = 0; i < kfs.length - 1; i++) {
                if (kfs[i].time <= time && kfs[i+1].time >= time) {
                    k1 = kfs[i];
                    k2 = kfs[i+1];
                    break;
                }
            }
            
            if (time <= k1.time) {
                return { 
                    x: k1.x, 
                    y: k1.y, 
                    width: k1.width ?? entity.width ?? 30, 
                    height: k1.height ?? entity.height ?? 30, 
                    rotation: k1.rotation ?? entity.rotation ?? 0,
                    opacity: k1.opacity ?? entity.opacity ?? 1
                };
            }
            if (time >= k2.time) {
                return { 
                    x: k2.x, 
                    y: k2.y, 
                    width: k2.width ?? entity.width ?? 30, 
                    height: k2.height ?? entity.height ?? 30, 
                    rotation: k2.rotation ?? entity.rotation ?? 0,
                    opacity: k2.opacity ?? entity.opacity ?? 1
                };
            }
            
            const rawProgress = (time - k1.time) / (k2.time - k1.time);
            const easingType = k1.easing || window.appState.easing || 'easeInOut';
            const easingFn = easings[easingType] || easings.easeInOut;
            const progress = easingFn(rawProgress);
            
            // Rotation interpolation handling (shortest path)
            const r1 = k1.rotation ?? entity.rotation ?? 0;
            const r2 = k2.rotation ?? entity.rotation ?? 0;
            let diff = (r2 - r1 + 180) % 360 - 180;
            if (diff < -180) diff += 360;
            const rot = r1 + diff * progress;

            return {
                x: k1.x + (k2.x - k1.x) * progress,
                y: k1.y + (k2.y - k1.y) * progress,
                width: (k1.width ?? entity.width ?? 30) + ((k2.width ?? entity.width ?? 30) - (k1.width ?? entity.width ?? 30)) * progress,
                height: (k1.height ?? entity.height ?? 30) + ((k2.height ?? entity.height ?? 30) - (k1.height ?? entity.height ?? 30)) * progress,
                rotation: rot,
                opacity: (k1.opacity ?? entity.opacity ?? 1) + ((k2.opacity ?? entity.opacity ?? 1) - (k1.opacity ?? entity.opacity ?? 1)) * progress
            };
        }

        function setKeyframe(entityId, x, y, width, height, rotation, opacity, easing) {
            const entity = window.appState.entities.find(e => e.id === entityId);
            if (!entity) return;
            
            const time = window.appState.currentTime;
            const threshold = 0.1; // 100ms tolerance
            
            let existingIdx = entity.keyframes.findIndex(k => Math.abs(k.time - time) < threshold);
            
            const currentState = getInterpolatedState(entity, time);
            const finalX = x !== undefined ? x : currentState.x;
            const finalY = y !== undefined ? y : currentState.y;
            const finalWidth = width !== undefined ? width : currentState.width;
            const finalHeight = height !== undefined ? height : currentState.height;
            const finalRot = rotation !== undefined ? rotation : currentState.rotation;
            const finalOpacity = opacity !== undefined ? opacity : currentState.opacity;
            const finalEasing = easing !== undefined ? easing : (existingIdx >= 0 ? entity.keyframes[existingIdx].easing : undefined);

            if (existingIdx >= 0) {
                entity.keyframes[existingIdx].x = finalX;
                entity.keyframes[existingIdx].y = finalY;
                entity.keyframes[existingIdx].width = finalWidth;
                entity.keyframes[existingIdx].height = finalHeight;
                entity.keyframes[existingIdx].rotation = finalRot;
                entity.keyframes[existingIdx].opacity = finalOpacity;
                if (easing !== undefined) entity.keyframes[existingIdx].easing = finalEasing;
            } else {
                entity.keyframes.push({ 
                    time, 
                    x: finalX, 
                    y: finalY, 
                    width: finalWidth, 
                    height: finalHeight, 
                    rotation: finalRot, 
                    opacity: finalOpacity,
                    easing: finalEasing
                });
                entity.keyframes.sort((a, b) => a.time - b.time);
            }
            drawKeyframeMarkers();
        }

        function addEntity(type, content, x=50, y=50, width=30, height=30) {
            const id = 'ent_' + Math.random().toString(36).substr(2, 9);
            window.appState.entities.push({
                id, type, content, width, height,
                rotation: 0,
                opacity: 1,
                flipH: false,
                flipV: false,
                keyframes: [{ time: window.appState.currentTime, x, y, width, height, rotation: 0, opacity: 1 }]
            });
            selectEntity(id);
            playSfx('pop');
            renderStage();
        }

        function setBackground(url) {
            document.getElementById('stage').style.backgroundImage = `url('${url}')`;
            window.appState.backgroundId = url;
            playSfx('whoosh');
        }

        function selectEntity(id) {
            window.appState.selectedEntityId = id;
            const delBtn = document.getElementById('btn-delete');
            if (delBtn) delBtn.disabled = !id;
            
            const controls = document.getElementById('selection-controls');
            if (controls) {
                if (id) {
                    controls.classList.remove('hidden');
                    controls.classList.add('flex');
                    syncSelectionUI();
                } else {
                    controls.classList.add('hidden');
                    controls.classList.remove('flex');
                }
            }
            
            drawKeyframeMarkers();
            renderStage();
        }

        // Gesture controls setup for mobile-first pinch-to-resize and rotate
        function setupGestures() {
            const stage = document.getElementById('stage');
            let activeTouches = {};
            let startDist = 0;
            let startAngle = 0;
            let startWidth = 0;
            let startHeight = 0;
            let startRotation = 0;

            stage.addEventListener('touchstart', (e) => {
                const id = window.appState.selectedEntityId;
                if (!id) return;
                const ent = window.appState.entities.find(e => e.id === id);
                if (!ent) return;

                for (let i = 0; i < e.touches.length; i++) {
                    const touch = e.touches[i];
                    activeTouches[touch.identifier] = { x: touch.clientX, y: touch.clientY };
                }

                if (e.touches.length === 2) {
                    // Two fingers on screen: compute starting metrics
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    startDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    startAngle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;
                    startWidth = ent.width || 30;
                    startHeight = ent.height || 30;
                    startRotation = ent.rotation || 0;
                }
            }, { passive: true });

            stage.addEventListener('touchmove', (e) => {
                const id = window.appState.selectedEntityId;
                if (!id) return;
                const ent = window.appState.entities.find(e => e.id === id);
                if (!ent) return;

                if (e.touches.length === 2) {
                    const t1 = e.touches[0];
                    const t2 = e.touches[1];
                    const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    const angle = Math.atan2(t2.clientY - t1.clientY, t2.clientX - t1.clientX) * 180 / Math.PI;

                    // Resize logic (Scale)
                    if (startDist > 0) {
                        const ratio = dist / startDist;
                        ent.width = Math.max(5, Math.min(150, Math.round(startWidth * ratio)));
                        ent.height = Math.max(5, Math.min(150, Math.round(startHeight * ratio)));
                    }

                    // Rotation logic
                    const deltaAngle = angle - startAngle;
                    ent.rotation = Math.round((startRotation + deltaAngle) % 360);

                    setKeyframe(id, undefined, undefined, ent.width, ent.height, ent.rotation, ent.opacity);
                    renderStage();
                }
            }, { passive: true });

            const handleTouchEnd = (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    delete activeTouches[e.changedTouches[i].identifier];
                }
                if (Object.keys(activeTouches).length < 2) {
                    startDist = 0;
                    startAngle = 0;
                }
            };

            stage.addEventListener('touchend', handleTouchEnd, { passive: true });
            stage.addEventListener('touchcancel', handleTouchEnd, { passive: true });
        }

        // --- TTS SYSTEM ---
        
        async function handleTTSRequest() {
            const text = document.getElementById('text-input').value.trim();
            if (!text) return;
            
            const btn = document.getElementById('btn-generate-tts');

        function deleteSelected() {
            const id = window.appState.selectedEntityId;
            if (!id) return;
            window.appState.entities = window.appState.entities.filter(e => e.id !== id);
            const el = document.getElementById(id);
            if (el) el.remove();
            selectEntity(null);
            playSfx('whoosh');
        }

        // --- DRAG & DROP ---

        function setupDrag() {
            const stage = document.getElementById('stage');
            let draggingEntity = null;
            let dragMode = 'move'; // 'move', 'resize', 'rotate'
            let dragOffset = { x: 0, y: 0 };
            let initialEntityData = {};
            
            stage.addEventListener('pointerdown', (e) => {
                const targetHandle = e.target.closest('.handle');
                const targetEntity = e.target.closest('.stage-entity');
                
                if (!targetEntity) return;
                
                // Stop playback on interaction
                if (window.appState.playing) togglePlayback();
                
                const id = targetEntity.id;
                selectEntity(id);
                draggingEntity = id;
                targetEntity.setPointerCapture(e.pointerId);
                
                const rect = targetEntity.getBoundingClientRect();
                const stageRect = stage.getBoundingClientRect();
                
                // Check if we hit a handle
                if (targetHandle) {
                    dragMode = targetHandle.dataset.type;
                    e.stopPropagation();
                } else {
                    dragMode = 'move';
                }

                const ent = window.appState.entities.find(en => en.id === id);
                initialEntityData = {
                    width: ent.width || 30,
                    height: ent.height || 30,
                    rotation: ent.rotation || 0,
                    opacity: ent.opacity ?? 1,
                    centerX: rect.left + rect.width/2,
                    centerY: rect.top + rect.height/2,
                    startX: e.clientX,
                    startY: e.clientY
                };

                // Calculate grab offset from center for move
                dragOffset.x = e.clientX - initialEntityData.centerX;
                dragOffset.y = e.clientY - initialEntityData.centerY;
                
                targetEntity.style.transition = 'none';
            });
            
            stage.addEventListener('pointermove', (e) => {
                if (!draggingEntity) return;
                
                const ent = window.appState.entities.find(en => en.id === draggingEntity);
                const stageRect = stage.getBoundingClientRect();
                
                if (dragMode === 'move') {
                    // Target center in px relative to stage
                    let targetX = (e.clientX - stageRect.left - dragOffset.x);
                    let targetY = (e.clientY - stageRect.top - dragOffset.y);
                    
                    let pctX = (targetX / stageRect.width) * 100;
                    let pctY = (targetY / stageRect.height) * 100;
                    
                    pctX = Math.max(0, Math.min(100, pctX));
                    pctY = Math.max(0, Math.min(100, pctY));
                    
                    const el = document.getElementById(draggingEntity);
                    if (el) {
                        el.style.left = `${pctX}%`;
                        el.style.top = `${pctY}%`;
                    }
                    setKeyframe(draggingEntity, pctX, pctY, ent.width, ent.height, ent.rotation, ent.opacity);
                } 
                else if (dragMode === 'resize') {
                    // Distance from center to current pointer
                    const dx = e.clientX - initialEntityData.centerX;
                    const dy = e.clientY - initialEntityData.centerY;
                    
                    // Original distance from center to handle
                    const originalDx = initialEntityData.startX - initialEntityData.centerX;
                    const originalDy = initialEntityData.startY - initialEntityData.centerY;
                    
                    const ratioX = originalDx !== 0 ? dx / originalDx : 1;
                    const ratioY = originalDy !== 0 ? dy / originalDy : 1;
                    
                    ent.width = Math.max(5, Math.min(150, initialEntityData.width * ratioX));
                    ent.height = Math.max(5, Math.min(150, (initialEntityData.height || 30) * ratioY));
                    setKeyframe(draggingEntity, undefined, undefined, ent.width, ent.height, ent.rotation, ent.opacity);
                    renderStage();
                }
                else if (dragMode === 'rotate') {
                    const angle = Math.atan2(e.clientY - initialEntityData.centerY, e.clientX - initialEntityData.centerX) * 180 / Math.PI;
                    const startAngle = Math.atan2(initialEntityData.startY - initialEntityData.centerY, initialEntityData.startX - initialEntityData.centerX) * 180 / Math.PI;
                    
                    ent.rotation = (initialEntityData.rotation + (angle - startAngle) + 360) % 360;
                    setKeyframe(draggingEntity, undefined, undefined, ent.width, ent.height, ent.rotation, ent.opacity);
                    renderStage();
                }
            });
            
            const stopDrag = (e) => {
                if (draggingEntity) {
                    const target = document.getElementById(draggingEntity);
                    if (target) target.releasePointerCapture(e.pointerId);
                    draggingEntity = null;
                }
            };
            
            stage.addEventListener('pointerup', stopDrag);
            stage.addEventListener('pointercancel', stopDrag);
        }

        // --- MODALS & TOOLS ---

        function openAssetModal(category) {
            closeModals();
            document.getElementById('asset-modal').classList.add('visible');
            switchAssetTab(category);
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(el => el.classList.remove('visible'));
        }

        function switchAssetTab(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const tabBtn = document.getElementById(`tab-${category}`);
            if (tabBtn) tabBtn.classList.add('active');
            
            const grid = document.getElementById('asset-grid');
            grid.innerHTML = '';
            
            // Set current tab scope
            grid.dataset.currentTab = category;

            const assets = assetMap[category] || [];
            
            if (assets.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'col-span-full py-8 text-center text-sm text-gray-400 font-semibold flex flex-col items-center gap-2';
                emptyMsg.innerHTML = `
                    <i data-lucide="folder-open" class="w-8 h-8 text-gray-300"></i>
                    <span>This library category is empty. Upload your own to start!</span>
                `;
                grid.appendChild(emptyMsg);
                lucide.createIcons();
                return;
            }

            assets.forEach(asset => {
                const el = document.createElement('div');
                
                if (category === 'sounds') {
                    el.className = 'bg-zinc-900 border border-purple-900/30 rounded-xl p-3 flex flex-col justify-between items-stretch gap-2 active:scale-95 transition-transform';
                    el.innerHTML = `
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-purple-950/40 rounded-lg flex items-center justify-center text-purple-400">
                                <i data-lucide="music" class="w-4 h-4"></i>
                            </div>
                            <span class="text-xs font-bold text-purple-200 truncate flex-1">${asset.label}</span>
                        </div>
                        <div class="flex gap-1.5">
                            <button class="btn-play-sound flex-1 bg-zinc-800 text-purple-300 text-[10px] font-bold py-1.5 rounded-lg active:bg-zinc-700">Play</button>
                            <button class="btn-add-timeline flex-1 bg-purple-600 text-white text-[10px] font-bold py-1.5 rounded-lg active:bg-purple-700">Add to video</button>
                        </div>
                    `;

                    // Sound playback preview button handler
                    el.querySelector('.btn-play-sound').addEventListener('click', (e) => {
                        e.stopPropagation();
                        const aud = new Audio(asset.value);
                        aud.volume = 0.8;
                        aud.play().catch(() => {});
                    });

                    // Add sound to current timeline position
                    el.querySelector('.btn-add-timeline').addEventListener('click', (e) => {
                        e.stopPropagation();
                        closeModals();
                        window.appState.timelineSounds.push({
                            id: 'snd_' + Math.random().toString(36).substr(2, 9),
                            time: window.appState.currentTime,
                            url: asset.value,
                            volume: 0.8
                        });
                        showToast('Sound added at ' + window.appState.currentTime.toFixed(2) + 's');
                        drawKeyframeMarkers();
                        renderSoundTimelineUI();
                    });
                } else {
                    el.className = `asset-item ${category === 'backgrounds' ? 'cover' : 'contain'}`;
                    el.innerHTML = `
                        <img src="${asset.value}" alt="${asset.label}" loading="lazy">
                        <div class="asset-item-label">${asset.label}</div>
                    `;
                    el.addEventListener('click', () => {
                        closeModals();
                        if (category === 'backgrounds') {
                            setBackground(asset.value);
                        } else {
                            addEntity('image', asset.value, 50, 50, category === 'items' ? 15 : 25, category === 'items' ? 15 : 25);
                        }
                    });
                }
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        // Timeline sound controls renderer
        function renderSoundTimelineUI() {
            const panel = document.getElementById('sound-timeline-panel');
            const container = document.getElementById('sound-timeline-items');
            if (!panel || !container) return;

            const sounds = window.appState.timelineSounds;
            if (sounds.length === 0) {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
                return;
            }

            panel.classList.remove('hidden');
            panel.classList.add('flex');
            container.innerHTML = '';

            sounds.forEach((sound, index) => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between gap-3 bg-zinc-900/70 border border-purple-950/40 p-2 rounded-lg text-xs';
                
                // Get display name
                const matchedAsset = assetMap.sounds.find(s => s.value === sound.url);
                const soundName = matchedAsset ? matchedAsset.label : 'Custom Sound';

                row.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-purple-200 truncate">${soundName}</div>
                        <div class="text-[10px] text-purple-400/80 flex items-center gap-2">
                            <span>Trigger Time:</span>
                            <input type="number" step="0.1" min="0" max="${window.appState.duration}" value="${sound.time.toFixed(1)}" class="w-12 bg-zinc-950 text-purple-300 border border-purple-900/30 text-center rounded px-1 font-mono text-[10px] sound-time-input">
                            <span>s</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <div class="flex items-center gap-1">
                            <i data-lucide="volume-2" class="w-3.5 h-3.5 text-purple-400"></i>
                            <input type="range" min="0" max="1" step="0.1" value="${sound.volume !== undefined ? sound.volume : 0.8}" class="w-16 accent-purple-600 sound-volume-slider">
                        </div>
                        <button class="sound-preview-btn p-1 bg-zinc-800 text-purple-300 rounded active:scale-90"><i data-lucide="play" class="w-3.5 h-3.5"></i></button>
                        <button class="sound-delete-btn p-1 bg-red-950/30 text-red-400 rounded border border-red-900/30 active:scale-90"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                `;

                // Handle changes
                const timeInput = row.querySelector('.sound-time-input');
                timeInput.addEventListener('change', (e) => {
                    const newTime = Math.max(0, Math.min(window.appState.duration, parseFloat(e.target.value) || 0));
                    sound.time = newTime;
                    renderSoundTimelineUI();
                    drawKeyframeMarkers();
                });

                const volSlider = row.querySelector('.sound-volume-slider');
                volSlider.addEventListener('input', (e) => {
                    sound.volume = parseFloat(e.target.value);
                });

                row.querySelector('.sound-preview-btn').addEventListener('click', () => {
                    const aud = new Audio(sound.url);
                    aud.volume = sound.volume !== undefined ? sound.volume : 0.8;
                    aud.play().catch(() => {});
                });

                row.querySelector('.sound-delete-btn').addEventListener('click', () => {
                    window.appState.timelineSounds.splice(index, 1);
                    renderSoundTimelineUI();
                    drawKeyframeMarkers();
                });

                container.appendChild(row);
            });
            lucide.createIcons();
        }

        function clearAllTimelineSounds() {
            window.appState.timelineSounds = [];
            renderSoundTimelineUI();
            drawKeyframeMarkers();
        }

        function addTextBubble() {
            const ent = window.appState.entities.find(e => e.id === window.appState.selectedEntityId);
            if (ent && ent.type === 'text') {
                // Edit existing
                document.getElementById('text-input').value = ent.content;
                document.getElementById('text-input').dataset.editId = ent.id;
            } else {
                // New
                document.getElementById('text-input').value = '';
                document.getElementById('text-input').dataset.editId = '';
            }
            document.getElementById('text-edit-modal').classList.add('visible');
        }

        function saveTextEdit() {
            const val = document.getElementById('text-input').value.trim();
            const editId = document.getElementById('text-input').dataset.editId;
            
            closeModals();
            if (!val) return;

            if (editId) {
                const ent = window.appState.entities.find(e => e.id === editId);
                if (ent) ent.content = val;
                const el = document.getElementById(editId);
                if (el) el.textContent = val;
            } else {
                addEntity('text', val, 50, 50);
            }
        }

        // Settings Modal Open helper
        function openSettingsModal() {
            closeModals();
            document.getElementById('settings-modal').classList.add('visible');
            const setDur = document.getElementById('settings-duration');
            if (setDur) {
                setDur.value = window.appState.duration;
                document.getElementById('settings-duration-label').textContent = window.appState.duration + 's';
            }
        }

        // Toast feedback notifier helper
        function showToast(message) {
            const toast = document.getElementById('copy-toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }

        // Copy Game HTML code utility
        function copyProjectHTML() {
            // Parse document text to clean it up in memory
            const parser = new DOMParser();
            const doc = parser.parseFromString(document.documentElement.outerHTML, 'text/html');
            
            // Remove the dev tools section completely
            const devSection = doc.getElementById('dev-tools-section');
            if (devSection) {
                devSection.remove();
            }

            // Clean up live stage entities in the copy so they start fresh and recreate on load
            const stageInDoc = doc.getElementById('stage');
            if (stageInDoc) {
                stageInDoc.innerHTML = '';
            }

            // Reset selection controls panel in the copy
            const selControls = doc.getElementById('selection-controls');
            if (selControls) {
                selControls.classList.add('hidden');
                selControls.classList.remove('flex');
            }
            
            // Get cleaned HTML string
            let htmlCode = doc.documentElement.outerHTML;

            // Serialize and inject current appState
            const cleanState = JSON.parse(JSON.stringify(window.appState));
            cleanState.playing = false;
            cleanState.currentTime = 0;
            cleanState.selectedEntityId = null;
            cleanState.lastFrameTime = 0;

            const stateRegex = /window\.appState\s*=\s*\{[\s\S]*?\};/;
            const serializedState = `window.appState = ${JSON.stringify(cleanState, null, 4)};`;
            htmlCode = htmlCode.replace(stateRegex, serializedState);

            // Serialize and inject current sekaiEditable (captures metadata changes)
            const editableRegex = /window\.sekaiEditable\s*=\s*\{[\s\S]*?\};/;
            const serializedEditable = `window.sekaiEditable = ${JSON.stringify(window.sekaiEditable, null, 4)};`;
            htmlCode = htmlCode.replace(editableRegex, serializedEditable);
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(htmlCode).then(() => {
                    showToast('Game HTML Copied to Clipboard!');
                    closeModals();
                }).catch(() => {
                    fallbackCopyHTML(htmlCode);
                });
            } else {
                fallbackCopyHTML(htmlCode);
            }
        }

        function fallbackCopyHTML(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed'; // Avoid scrolling to bottom
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('Game HTML Copied to Clipboard (Fallback)!');
                closeModals();
            } catch (err) {
                alert('Could not copy HTML. Please export/share instead.');
            }
            document.body.removeChild(textarea);
        }

        // Custom Asset Upload Handler Trigger
        function triggerCustomUpload() {
            const input = document.getElementById('hidden-input');
            const currentTab = document.getElementById('asset-grid').dataset.currentTab || 'characters';
            
            // Adjust input accept type dynamically
            if (currentTab === 'sounds') {
                input.accept = "audio/*, .mp3, .wav, .m4a, .ogg, application/octet-stream";
            } else {
                input.accept = "image/*";
            }
            input.click();
        }

        // Process File Input upload
        function handleFileInput(e) {
            const file = e.target.files[0];
            if (!file) return;

            const currentTab = document.getElementById('asset-grid').dataset.currentTab || 'characters';
            const reader = new FileReader();

            reader.onload = function(event) {
                const dataUrl = event.target.result;
                const uniqueId = 'cust_' + Date.now();
                const label = file.name.substring(0, 10) + '...';

                if (currentTab === 'sounds') {
                    const customSound = {
                        id: uniqueId,
                        label: file.name.substring(0, 12) + '...',
                        value: dataUrl
                    };
                    window.appState.customAssets.sounds.push(customSound);
                    showToast('Custom sound added to Library!');
                } else {
                    const customImg = {
                        id: uniqueId,
                        type: 'image',
                        value: dataUrl,
                        description: file.name + ' user uploaded'
                    };
                    
                    if (currentTab === 'backgrounds') {
                        window.appState.customAssets.backgrounds.push(customImg);
                    } else if (currentTab === 'items') {
                        window.appState.customAssets.items.push(customImg);
                    } else {
                        window.appState.customAssets.characters.push(customImg);
                    }
                    showToast('Custom asset added to Library!');
                }
                
                // Reinitialize assets map
                applyAllEditableValues();
                // Refresh visual tab list
                switchAssetTab(currentTab);
            };

            reader.readAsDataURL(file);
            // Reset input so upload can be triggered again with same file if needed
            e.target.value = '';
        }

        // Share handler removed as requested

        // PREVIEW EDITING API
        (function setupPreviewEditingAPI() {
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg?.origin !== 'sekai_gaming_iframe_api') return;
                switch (msg.type) {
                    case 'get_editable_metadata':
                        window.parent.postMessage({ origin: 'sekai_gaming_iframe_api', type: 'receive_editable_metadata', taskId: msg.taskId, data: window.sekaiEditable || {} }, '*');
                        break;
                    case 'apply_change':
                        const success = applySingleChange(msg.data.id, msg.data.value, msg.data.name, msg.data.description);
                        window.parent.postMessage({ origin: 'sekai_gaming_iframe_api', type: 'receive_apply_change', taskId: msg.taskId, data: { success } }, '*');
                        break;
                    case 'get_current_html':
                        window.parent.postMessage({ origin: 'sekai_gaming_iframe_api', type: 'receive_current_html', taskId: msg.taskId, data: { html: document.documentElement.outerHTML } }, '*');
                        break;
                    case 'reset_changes':
                        location.reload();
                        break;
                }
            });

            function applySingleChange(id, value, name, description) {
                const categories = ['tune', 'images', 'videos', 'music', 'sfx', 'colors', 'text', 'prompts', 'voices'];
                for (const cat of categories) {
                    const item = window.sekaiEditable[cat]?.find(i => i.id === id);
                    if (!item) continue;
                    item.value = value;
                    if (name) item.name = name;
                    if (description) item.description = description;

                    if (item.cssVar) {
                        document.documentElement.style.setProperty(item.cssVar, value);
                    } else if (item.path) {
                        setNestedValue(window, item.path, value);
                    } else if (item.selector) {
                        const el = document.querySelector(item.selector);
                        if (!el) return false;
                        if (el.tagName === 'AUDIO') {
                            const wasPlaying = !el.paused;
                            el.src = value;
                            el.load();
                            if (wasPlaying) el.play().catch(() => {});
                        } else if (el.tagName === 'VIDEO') {
                            el.src = value;
                            el.load();
                        } else if (item.property === 'src') {
                            el.src = value;
                        } else if (item.property === 'backgroundImage') {
                            el.style.backgroundImage = `url('${value}')`;
                        } else if (item.property === 'placeholder') {
                            el.placeholder = value;
                        } else {
                            el.textContent = value;
                        }
                    }
                    // Re-process image lists for modals
                    applyAllEditableValues(); 
                    return true;
                }
                return false;
            }
        })();

        // BOOT
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
